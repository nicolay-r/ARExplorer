<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8">
<!--
  Standalone d3.js v4 FORCE-DIRECTED graph.
  Extracted and simplified from the ARE-d3js / ARExplorer template (draw_force).
  Open directly in a browser - sample data is inlined, no server needed.

  Data shape:
    nodes: [{ id: <string>, c: <number frequency> }]
    links: [{ source: <node id>, target: <node id>, c: <weight>, sent: "pos"|"neg"|"neu" }]
-->
<style>
    .nodes circle { stroke: #fff; stroke-width: 1.5px; }
    text { font: 10px sans-serif; text-shadow: 0 1px 0 #fff, 1px 0 0 #fff, 0 -1px 0 #fff, -1px 0 0 #fff; }
    #svg_container { text-align: center; }
</style>
<body>

<div id="svg_container"></div>

<script src="https://d3js.org/d3.v4.min.js"></script>
<script>
    const width = window.innerWidth * 0.9;
    const height = window.innerHeight * 0.85;

    // Edge sentiment -> color
    const colorMap = { pos: "blue", neg: "red", neu: "grey" };

    // ---- Sample data (replace with d3.json(...) in a real app) ----
    const graph = {
        nodes: [
            { id: "Anna",    c: 1700 },
            { id: "Pierre",  c: 1200 },
            { id: "Natasha", c: 900 },
            { id: "Andrei",  c: 800 },
            { id: "Napoleon", c: 400 }
        ],
        links: [
            { source: "Anna",    target: "Pierre",  c: 0.5, sent: "pos" },
            { source: "Pierre",  target: "Natasha", c: 0.4, sent: "pos" },
            { source: "Andrei",  target: "Natasha", c: 0.3, sent: "neg" },
            { source: "Napoleon", target: "Andrei", c: 0.6, sent: "neg" },
            { source: "Anna",    target: "Andrei",  c: 0.2, sent: "neu" }
        ]
    };
    const maxCount = d3.max(graph.nodes, d => d.c);

    function draw_force(graph) {
        d3.select("svg").remove();

        const svg = d3.select("#svg_container").append("svg")
            .attr("width", width)
            .attr("height", height);

        // Three forces: link distance, node repulsion, centering.
        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2));

        // Reusable arrowhead for highlighting directed edges.
        svg.append("defs").selectAll("marker")
            .data(["arrow"])
            .enter().append("marker")
            .attr("id", d => d)
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 2).attr("refY", 0)
            .attr("markerWidth", 4).attr("markerHeight", 4)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "black");

        // Links: width by weight, color by sentiment.
        const link = svg.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(graph.links)
            .enter().append("line")
            .attr("stroke-width", d => d.c * 30)
            .attr("opacity", 0.5)
            .style("stroke", d => colorMap[d.sent] || "pink");

        // Nodes: a <g> holding a circle + label, draggable.
        const node = svg.selectAll(".node")
            .data(graph.nodes)
            .enter().append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.append("circle")
            .attr("r", 10)
            .attr("fill", "black")
            .attr("fill-opacity", d => 0.2 + 0.8 * d.c / maxCount);

        node.append("text")
            .attr("dx", 12).attr("dy", "0.35em")
            .text(d => d.id);

        simulation.nodes(graph.nodes).on("tick", ticked);
        simulation.force("link").links(graph.links);

        function ticked() {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

            const padding = 12;
            node.attr("transform", d => {
                d.x = Math.max(padding, Math.min(width - padding, d.x));
                d.y = Math.max(padding, Math.min(height - padding, d.y));
                return `translate(${d.x},${d.y})`;
            });
        }

        function dragstarted(d) {
            if (!d3.event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        }
        function dragged(d) { d.fx = d3.event.x; d.fy = d3.event.y; }
        function dragended(d) {
            if (!d3.event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
        }
    }

    draw_force(graph);
</script>
</body>
</html>
