<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARExplorer</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
        body { display: flex; height: 100vh; color: #1f2933; }

        /* Left panel: chat */
        #chat_panel {
            width: 360px; min-width: 300px; display: flex; flex-direction: column;
            border-right: 1px solid #e1e5ea; background: #f7f9fb;
        }
        #chat_header { padding: 14px 16px; font-weight: 600; border-bottom: 1px solid #e1e5ea; }
        #chat_header small { display: block; font-weight: 400; color: #7b8794; font-size: 11px; }
        #messages { flex: 1; overflow-y: auto; padding: 12px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 12px; max-width: 90%; white-space: pre-wrap; line-height: 1.4; font-size: 14px; }
        .msg.user { background: #2850b4; color: #fff; margin-left: auto; border-bottom-right-radius: 3px; }
        .msg.agent { background: #fff; border: 1px solid #e1e5ea; border-bottom-left-radius: 3px; }
        .msg.error { background: #fde8e6; color: #b42323; border: 1px solid #f4c7c3; }
        .msg.thinking { color: #7b8794; font-style: italic; }
        .thinking-head { font-weight: 600; font-style: normal; color: #52606d; }
        .thinking.collapsible .thinking-head { cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
        .thinking-chevron { display: inline-block; font-size: 10px; color: #9aa5b1; transition: transform 0.15s ease; }
        .thinking.collapsed .thinking-chevron { transform: rotate(-90deg); }
        .thinking.collapsed .thinking-log { display: none; }
        .thinking-log { list-style: none; margin: 6px 0 0; padding: 0; font-style: normal; font-size: 12px; }
        .thinking-log li { padding: 2px 0 2px 16px; position: relative; color: #7b8794; }
        .thinking-log li::before { content: "›"; position: absolute; left: 2px; color: #9aa5b1; }
        .thinking-log li.active { color: #2850b4; }
        .thinking-log li.active::before { content: "▸"; color: #2850b4; }
        .thinking-log li.done { color: #52606d; }
        .thinking-log li.done::before { content: "✓"; color: #2f9e44; }
        .thinking-bar { margin-top: 4px; height: 4px; border-radius: 2px; background: #e1e5ea; overflow: hidden; }
        .thinking-bar > span { display: block; height: 100%; width: 0; background: #2850b4; transition: width 0.2s ease; }
        .thinking-bar.indeterminate > span { width: 40%; animation: thinking-slide 1s linear infinite; }
        @keyframes thinking-slide { from { margin-left: -40%; } to { margin-left: 100%; } }
        #composer { display: flex; flex-direction: column; padding: 10px; border-top: 1px solid #e1e5ea; gap: 8px; }
        /* Cursor-style input: a single rounded box that holds the textarea with
           the attach/send controls tucked inside along the bottom edge. */
        #input_box {
            display: flex; flex-direction: column; gap: 4px;
            border: 1px solid #cbd2d9; border-radius: 12px; background: #fff;
            padding: 8px 8px 6px; transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        #input_box:focus-within { border-color: #2850b4; box-shadow: 0 0 0 3px rgba(40, 80, 180, 0.12); }
        #composer textarea {
            width: 100%; resize: none; border: 0; outline: 0; background: transparent;
            font: inherit; line-height: 1.45; padding: 2px 4px;
            min-height: 60px; max-height: 220px; overflow-y: auto;
        }
        #input_actions { display: flex; align-items: center; gap: 6px; }
        #send {
            margin-left: auto; width: 32px; height: 32px; flex: 0 0 auto;
            border: 0; border-radius: 8px; background: #2850b4; color: #fff;
            font-size: 17px; font-weight: 600; cursor: pointer; line-height: 1;
            display: inline-flex; align-items: center; justify-content: center;
        }
        #send:hover { background: #1f4099; }
        #send:disabled { background: #c2cad3; cursor: not-allowed; }
        #attach_btn {
            width: 32px; height: 32px; flex: 0 0 auto; border: 0; border-radius: 8px;
            background: transparent; color: #52606d; font-size: 17px; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }
        #attach_btn:hover { background: #eef1f5; }
        #attach_btn:disabled { color: #b6c0cc; cursor: not-allowed; }
        #attachments { display: flex; flex-wrap: wrap; gap: 6px; }
        #attachments:empty { display: none; }
        .chip { display: inline-flex; align-items: center; gap: 6px; background: #eef1f5; border: 1px solid #d3d9e0; border-radius: 14px; padding: 3px 6px 3px 10px; font-size: 12px; color: #3e4c59; }
        .chip .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
        .chip button { background: none; border: 0; color: #7b8794; cursor: pointer; font-size: 15px; line-height: 1; padding: 0 2px; }
        .chip button:hover { color: #b42323; }

        /* Main panel: visualization */
        #vis_panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #vis_toolbar { padding: 10px 16px; border-bottom: 1px solid #e1e5ea; display: flex; align-items: center; gap: 8px; }
        #vis_toolbar .layout-btn { padding: 6px 14px; border: 1px solid #cbd2d9; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 600; color: #52606d; }
        #vis_toolbar .layout-btn.active { background: #2850b4; color: #fff; border-color: #2850b4; }
        .legend { margin-left: auto; display: flex; gap: 14px; font-size: 12px; color: #52606d; }
        .legend span::before { content: ""; display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
        .legend .positive::before { background: #2850b4; }
        .legend .negative::before { background: #b42323; }
        .legend .neutral::before { background: #979797; }
        #svg_container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #svg_container .empty { color: #9aa5b1; font-size: 14px; }

        .links line { stroke-linecap: round; }
        .node text, .radial-node { font: 11px sans-serif; }
        .node text { text-shadow: 0 1px 0 #fff, 1px 0 0 #fff, 0 -1px 0 #fff, -1px 0 0 #fff; }
        .link { fill: none; }
    </style>
</head>
<body>

<div id="chat_panel">
    <div id="chat_header">
        ARExplorer
        <small>Ask about attitudes &amp; relations between entities in your documents.</small>
    </div>
    <div id="messages"></div>
    <div id="composer">
        <div id="attachments"></div>
        <div id="input_box">
            <textarea id="prompt" rows="1" placeholder="e.g. Extract entities and their attitudes from: …  (or attach .txt files)"></textarea>
            <div id="input_actions">
                <button id="attach_btn" type="button" title="Attach .txt documents" aria-label="Attach .txt documents">&#128206;</button>
                <button id="send" type="button" title="Send" aria-label="Send">&#8593;</button>
            </div>
        </div>
        <input type="file" id="file_input" accept=".txt,text/plain" multiple hidden>
    </div>
</div>

<div id="vis_panel">
    <div id="vis_toolbar">
        <button class="layout-btn active" id="force_btn" onclick="setLayout('force')">Force</button>
        <button class="layout-btn" id="radial_btn" onclick="setLayout('radial')">Radial</button>
        <div class="legend">
            <span class="positive">positive</span>
            <span class="negative">negative</span>
            <span class="neutral">neutral</span>
        </div>
    </div>
    <div id="svg_container"><div class="empty">No graph yet — ask the agent to extract relations.</div></div>
</div>

<script src="https://d3js.org/d3.v4.min.js"></script>
<script>
    //////////////////////////////////////////////////////////////////////////
    // Relation -> color (generic; sentiment is the default configuration)
    //////////////////////////////////////////////////////////////////////////
    const RELATION_COLORS = {
        positive: "#2850b4", pos: "#2850b4",
        negative: "#b42323", neg: "#b42323",
        neutral: "#979797",  neu: "#979797"
    };
    const DEFAULT_COLOR = "#52606d";
    const relColor = rel => RELATION_COLORS[(rel || "").toLowerCase()] || DEFAULT_COLOR;

    // Human-readable labels for server-side progress events (keyed by tool).
    const PROGRESS_LABELS = {
        classify_relations: "Classifying relations"
    };

    let currentLayout = "force";
    let currentGraph = { nodes: [], edges: [] };
    let sessionId = null;

    //////////////////////////////////////////////////////////////////////////
    // Chat
    //////////////////////////////////////////////////////////////////////////
    const messagesEl = document.getElementById("messages");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("send");
    const attachBtn = document.getElementById("attach_btn");
    const fileInput = document.getElementById("file_input");
    const attachmentsEl = document.getElementById("attachments");

    //////////////////////////////////////////////////////////////////////////
    // Attachments (.txt documents sent to the agent as a session artifact)
    //////////////////////////////////////////////////////////////////////////
    let attachments = []; // [{ name, text }]

    function renderAttachments() {
        attachmentsEl.innerHTML = "";
        attachments.forEach((att, idx) => {
            const chip = document.createElement("div");
            chip.className = "chip";
            const name = document.createElement("span");
            name.className = "chip-name";
            name.textContent = att.name;
            name.title = att.name;
            const remove = document.createElement("button");
            remove.type = "button";
            remove.title = "Remove";
            remove.innerHTML = "&times;";
            remove.addEventListener("click", () => {
                attachments.splice(idx, 1);
                renderAttachments();
            });
            chip.appendChild(name);
            chip.appendChild(remove);
            attachmentsEl.appendChild(chip);
        });
    }

    attachBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async () => {
        const files = Array.from(fileInput.files || []);
        for (const file of files) {
            try {
                const text = await file.text();
                attachments.push({ name: file.name, text });
            } catch (err) {
                addMessage(`Could not read ${file.name}: ${err.message}`, "error");
            }
        }
        fileInput.value = ""; // allow re-selecting the same file later
        renderAttachments();
    });

    function addMessage(text, kind) {
        const div = document.createElement("div");
        div.className = "msg " + kind;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
    }

    // A "thinking" bubble that grows a live log of server-side actions.
    function addThinking() {
        const div = document.createElement("div");
        div.className = "msg agent thinking";
        const head = document.createElement("div");
        head.className = "thinking-head";
        head.textContent = "thinking…";
        const log = document.createElement("ul");
        log.className = "thinking-log";
        div.appendChild(head);
        div.appendChild(log);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        function activeLine() {
            let li = log.querySelector("li.active");
            if (!li) {
                li = document.createElement("li");
                li.className = "active";
                log.appendChild(li);
            }
            return li;
        }

        // The label used to pair a tool's "→ result" completion with the step
        // its call started: strip the trailing ellipsis and any "(args)" tail.
        function baseLabel(text) {
            let s = text.replace(/…+$/, "");
            const paren = s.indexOf(" (");
            if (paren !== -1) s = s.slice(0, paren);
            return s.trim();
        }

        function appendStep(text) {
            const prev = log.querySelector("li.active");
            if (prev) prev.classList.remove("active");
            const li = document.createElement("li");
            li.className = "active";
            li.dataset.label = baseLabel(text);
            li.textContent = text;
            log.appendChild(li);
            return li;
        }

        // Fold a completion into its step: drop the redundant "done" word and any
        // progress bar, keep the label, and append whatever detail came back.
        function markStepDone(li, result) {
            const detail = (result || "").replace(/^done\b\s*—?\s*/, "").trim();
            li.classList.remove("active");
            li.classList.add("done");
            li.dataset.done = "1";
            li.textContent = detail ? `${li.dataset.label} — ${detail}` : li.dataset.label;
        }

        return {
            element: div,
            addLog(text) {
                // A "<label> → <result>" line completes an earlier step: update it
                // in place (marking it done) rather than adding a separate step.
                const sep = text.indexOf(" → ");
                if (sep !== -1) {
                    const label = text.slice(0, sep).trim();
                    const result = text.slice(sep + 3).trim();
                    const items = log.querySelectorAll("li");
                    for (let i = items.length - 1; i >= 0; i--) {
                        const li = items[i];
                        if (li.dataset.done) continue;
                        if (li.dataset.label && label.startsWith(li.dataset.label)) {
                            markStepDone(li, result);
                            messagesEl.scrollTop = messagesEl.scrollHeight;
                            return;
                        }
                    }
                    // No matching pending step (e.g. a result without a logged
                    // call): show it as its own already-done line.
                    markStepDone(appendStep(label), result);
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                    return;
                }
                appendStep(text);
                messagesEl.scrollTop = messagesEl.scrollHeight;
            },
            // Update the current step with a live progress counter + bar.
            setProgress({ label, done, total }) {
                const li = activeLine();
                let span = li.querySelector(".thinking-text");
                if (!span) {
                    li.textContent = "";
                    span = document.createElement("span");
                    span.className = "thinking-text";
                    li.appendChild(span);
                    const bar = document.createElement("div");
                    bar.className = "thinking-bar";
                    bar.appendChild(document.createElement("span"));
                    li.appendChild(bar);
                }
                const hasTotal = Number.isFinite(total) && total > 0;
                const pct = hasTotal ? Math.round((done / total) * 100) : 0;
                span.textContent = hasTotal
                    ? `${label} ${done}/${total} (${pct}%)`
                    : `${label} ${done}…`;
                const bar = li.querySelector(".thinking-bar");
                bar.classList.toggle("indeterminate", !hasTotal);
                bar.firstChild.style.width = hasTotal ? pct + "%" : "";
                messagesEl.scrollTop = messagesEl.scrollHeight;
            },
            // Fold the bubble into a single clickable line; the log stays in the
            // DOM so it can be unfolded later via the chevron. Drops the bubble
            // entirely when there were no steps to show.
            collapse(verb = "Done") {
                const active = log.querySelector("li.active");
                if (active) active.classList.remove("active");
                log.querySelectorAll(".thinking-bar").forEach(
                    bar => bar.classList.remove("indeterminate")
                );

                const count = log.querySelectorAll("li").length;
                if (count === 0) { div.remove(); return; }

                div.classList.add("collapsible", "collapsed");
                head.textContent = "";
                const chevron = document.createElement("span");
                chevron.className = "thinking-chevron";
                chevron.innerHTML = "&#9662;"; // ▾
                const label = document.createElement("span");
                label.textContent =
                    `${verb} · ${count} step${count === 1 ? "" : "s"}`;
                head.appendChild(chevron);
                head.appendChild(label);
                head.onclick = () => div.classList.toggle("collapsed");
            },
            remove() { div.remove(); }
        };
    }

    async function send() {
        const text = promptEl.value.trim();
        const documents = attachments.slice();
        if (!text && documents.length === 0) return;
        promptEl.value = "";
        autoGrow();
        sendBtn.disabled = true;
        attachBtn.disabled = true;

        let bubble = text;
        if (documents.length) {
            const names = documents.map(d => d.name).join(", ");
            const tag = `\uD83D\uDCCE ${documents.length} file(s): ${names}`;
            bubble = text ? `${text}\n\n${tag}` : tag;
        }
        addMessage(bubble, "user");
        attachments = [];
        renderAttachments();
        const thinking = addThinking();

        try {
            const res = await fetch("/api/chat/stream", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, session_id: sessionId, documents })
            });
            if (!res.ok || !res.body) throw new Error("HTTP " + res.status);

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            let finalResponse = null;
            let streamError = null;

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                // SSE messages are separated by a blank line.
                let sep;
                while ((sep = buffer.indexOf("\n\n")) !== -1) {
                    const chunk = buffer.slice(0, sep);
                    buffer = buffer.slice(sep + 2);
                    const line = chunk.split("\n").find(l => l.startsWith("data:"));
                    if (!line) continue;
                    const evt = JSON.parse(line.slice(5).trim());

                    if (evt.type === "session") {
                        sessionId = evt.session_id;
                    } else if (evt.type === "log") {
                        thinking.addLog(evt.text);
                    } else if (evt.type === "progress") {
                        thinking.setProgress({
                            label: PROGRESS_LABELS[evt.tool] || "Working",
                            done: evt.done,
                            total: evt.total
                        });
                    } else if (evt.type === "final") {
                        sessionId = evt.session_id || sessionId;
                        finalResponse = evt.response || {};
                    } else if (evt.type === "error") {
                        streamError = evt.error;
                    }
                }
            }

            if (streamError) throw new Error(streamError);

            thinking.collapse();
            const response = finalResponse || {};
            addMessage(response.message || "(no message)", "agent");

            const graph = response.graph || { nodes: [], edges: [] };
            if (graph.nodes && graph.nodes.length) {
                currentGraph = graph;
                if (response.layout === "force" || response.layout === "radial") {
                    setLayout(response.layout);
                } else {
                    render();
                }
            }
        } catch (err) {
            thinking.collapse("Stopped");
            addMessage("Request failed: " + err.message, "error");
        } finally {
            sendBtn.disabled = false;
            attachBtn.disabled = false;
            promptEl.focus();
        }
    }

    // Grow the textarea with its content (up to the CSS max-height), Cursor-style.
    function autoGrow() {
        promptEl.style.height = "auto";
        promptEl.style.height = Math.min(promptEl.scrollHeight, 220) + "px";
    }
    promptEl.addEventListener("input", autoGrow);

    sendBtn.addEventListener("click", send);
    promptEl.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    //////////////////////////////////////////////////////////////////////////
    // Layout switching + rendering
    //////////////////////////////////////////////////////////////////////////
    function setLayout(layout) {
        currentLayout = layout;
        document.getElementById("force_btn").classList.toggle("active", layout === "force");
        document.getElementById("radial_btn").classList.toggle("active", layout === "radial");
        render();
    }

    function containerSize() {
        const el = document.getElementById("svg_container");
        return { width: el.clientWidth, height: el.clientHeight };
    }

    function render() {
        const container = document.getElementById("svg_container");
        d3.select("#svg_container svg").remove();
        const empty = container.querySelector(".empty");
        const hasGraph = currentGraph && currentGraph.nodes && currentGraph.nodes.length;
        if (empty) empty.style.display = hasGraph ? "none" : "";
        if (!hasGraph) return;
        if (currentLayout === "radial") draw_radial(currentGraph);
        else draw_force(currentGraph);
    }

    window.addEventListener("resize", () => { if (currentGraph.nodes && currentGraph.nodes.length) render(); });

    //////////////////////////////////////////////////////////////////////////
    // FORCE LAYOUT (adapted from d3js-graph-visualization skill)
    //////////////////////////////////////////////////////////////////////////
    function toForceData(graph) {
        const ids = new Set(graph.nodes.map(n => n.id));
        return {
            nodes: graph.nodes.map(n => ({ id: n.id, c: n.weight != null ? n.weight : 1 })),
            links: graph.edges
                .filter(e => ids.has(e.source) && ids.has(e.target))
                .map(e => ({ source: e.source, target: e.target, c: e.weight != null ? e.weight : 1, rel: e.relation }))
        };
    }

    function draw_force(graph) {
        const data = toForceData(graph);
        const { width, height } = containerSize();
        const maxCount = d3.max(data.nodes, d => d.c) || 1;

        const svg = d3.select("#svg_container").append("svg")
            .attr("width", width).attr("height", height);

        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id).distance(140))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g").attr("class", "links")
            .selectAll("line").data(data.links).enter().append("line")
            .attr("stroke-width", d => Math.max(1, d.c * 6))
            .attr("opacity", 0.6)
            .style("stroke", d => relColor(d.rel));

        const node = svg.selectAll(".node").data(data.nodes).enter().append("g")
            .attr("class", "node")
            .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

        node.append("circle")
            .attr("r", 9).attr("fill", "#1f2933")
            .attr("fill-opacity", d => 0.25 + 0.75 * d.c / maxCount);
        node.append("text").attr("dx", 12).attr("dy", "0.35em").text(d => d.id);

        simulation.nodes(data.nodes).on("tick", ticked);
        simulation.force("link").links(data.links);

        function ticked() {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            const p = 12;
            node.attr("transform", d => {
                d.x = Math.max(p, Math.min(width - p, d.x));
                d.y = Math.max(p, Math.min(height - p, d.y));
                return `translate(${d.x},${d.y})`;
            });
        }
        function dragstarted(d) { if (!d3.event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(d) { d.fx = d3.event.x; d.fy = d3.event.y; }
        function dragended(d) { if (!d3.event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
    }

    //////////////////////////////////////////////////////////////////////////
    // RADIAL LAYOUT (adapted from d3js-graph-visualization skill)
    //////////////////////////////////////////////////////////////////////////
    const PREFIX = "root.";

    function toRadialData(graph) {
        const ids = new Set(graph.nodes.map(n => n.id));
        const importsByNode = {};
        graph.edges.forEach(e => {
            if (!ids.has(e.source) || !ids.has(e.target)) return;
            (importsByNode[e.source] = importsByNode[e.source] || [])
                .push({ name: PREFIX + e.target, w: e.weight != null ? e.weight : 1, rel: e.relation });
        });
        return graph.nodes.map(n => ({
            name: PREFIX + n.id,
            w: n.weight != null ? n.weight : 1,
            imports: importsByNode[n.id] || []
        }));
    }

    function draw_radial(graph) {
        const classes = toRadialData(graph);
        const { width, height } = containerSize();
        const diameter = Math.min(width, height);
        const radius = diameter / 2, innerRadius = radius * 0.78;

        const cluster = d3.cluster().size([360, innerRadius]);
        const line = d3.radialLine().curve(d3.curveBundle.beta(0.85))
            .radius(d => d.y).angle(d => d.x / 180 * Math.PI);

        let svg = d3.select("#svg_container").append("svg")
            .attr("width", diameter).attr("height", diameter);
        svg = svg.append("g").attr("transform", `translate(${radius},${radius})`);

        let link = svg.append("g").selectAll(".link"),
            node = svg.append("g").selectAll(".radial-node");

        function edgeOf(d) {
            return d.source.data.imports.find(s => s.name === d.target.data.name);
        }

        const root = packageHierarchy(classes).sum(d => d.w);
        cluster(root);

        link = link.data(packageImports(root.leaves())).enter().append("path")
            .each(d => { d.source = d[0]; d.target = d[d.length - 1]; })
            .attr("class", "link").attr("d", line)
            .attr("stroke-width", d => { const e = edgeOf(d); return e ? Math.max(1, e.w * 6) : 1; })
            .attr("opacity", 0.6)
            .style("stroke", d => { const e = edgeOf(d); return e ? relColor(e.rel) : DEFAULT_COLOR; })
            .style("fill", "none");

        node = node.data(root.leaves()).enter().append("text")
            .attr("class", "radial-node").attr("dy", "0.31em")
            .attr("transform", d => "rotate(" + (d.x - 90) + ")translate(" + (d.y + 8) + ",0)" + (d.x < 180 ? "" : "rotate(180)"))
            .attr("text-anchor", d => d.x < 180 ? "start" : "end")
            .text(d => d.data.key)
            .on("mouseover", dp => {
                const name = dp.data.name;
                svg.selectAll(".link").transition().duration(250).attr("opacity", 0.05);
                link.filter(d => d.source.data.name === name || d.target.data.name === name)
                    .transition().duration(250).attr("opacity", 0.8);
            })
            .on("mouseout", () => svg.selectAll(".link").transition().duration(250).attr("opacity", 0.6));
    }

    function packageHierarchy(classes) {
        const map = {};
        function find(name, data) {
            let node = map[name], i;
            if (!node) {
                node = map[name] = data || { name: name, children: [] };
                if (name.length) {
                    node.parent = find(name.substring(0, i = name.lastIndexOf(".")));
                    node.parent.children.push(node);
                    node.key = name.substring(i + 1);
                }
            }
            return node;
        }
        classes.forEach(d => find(d.name, d));
        return d3.hierarchy(map[""]);
    }

    function packageImports(nodes) {
        const map = {}, imports = [];
        nodes.forEach(d => { map[d.data.name] = d; });
        nodes.forEach(d => {
            if (d.data.imports) d.data.imports.forEach(i => {
                if (map[i.name]) imports.push(map[d.data.name].path(map[i.name]));
            });
        });
        return imports;
    }
</script>
